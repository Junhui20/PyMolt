name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Setup MinGW
        uses: egor-tensin/setup-mingw@v2
        with:
          platform: x64

      - name: Build
        run: |
          go mod tidy
          $env:CGO_ENABLED=1
          go build -tags desktop,production -ldflags "-H windowsgui -s -w" -o pymolt.exe .
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pymolt-windows
          path: pymolt.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build
        run: |
          go mod tidy
          CGO_ENABLED=1 go build -tags desktop,production -ldflags "-s -w" -o pymolt .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pymolt-macos
          path: pymolt

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Build
        run: |
          go mod tidy
          CGO_ENABLED=1 go build -tags desktop,production -ldflags "-s -w" -o pymolt .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pymolt-linux
          path: pymolt

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mv artifacts/pymolt-windows/pymolt.exe artifacts/pymolt-windows.exe
          mv artifacts/pymolt-macos/pymolt artifacts/pymolt-macos
          mv artifacts/pymolt-linux/pymolt artifacts/pymolt-linux
          chmod +x artifacts/pymolt-macos artifacts/pymolt-linux

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/pymolt-windows.exe
            artifacts/pymolt-macos
            artifacts/pymolt-linux
          generate_release_notes: true
