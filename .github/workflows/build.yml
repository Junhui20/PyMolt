name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Install MinGW
        run: choco install mingw -y --no-progress
        shell: pwsh

      - name: Build
        run: |
          go mod tidy
          $env:CGO_ENABLED=1
          $env:CC="gcc"
          go build -tags desktop,production -ldflags "-H windowsgui -s -w" -o pymolt.exe .
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: pymolt-windows
          path: pymolt.exe

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build
        run: |
          go mod tidy
          CGO_ENABLED=1 CGO_LDFLAGS="-framework UniformTypeIdentifiers" go build -tags desktop,production -ldflags "-s -w" -o pymolt .

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: pymolt-macos
          path: pymolt

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Build
        run: |
          go mod tidy
          CGO_ENABLED=1 go build -tags desktop,production -ldflags "-s -w" -o pymolt .

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: pymolt-linux
          path: pymolt

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          ls -R artifacts/
          cp artifacts/pymolt-windows/pymolt.exe pymolt-windows.exe
          cp artifacts/pymolt-macos/pymolt pymolt-macos
          cp artifacts/pymolt-linux/pymolt pymolt-linux
          chmod +x pymolt-macos pymolt-linux

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pymolt-windows.exe
            pymolt-macos
            pymolt-linux
          generate_release_notes: true
