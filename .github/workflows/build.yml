name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Least privilege by default; only the release job elevates to write.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean. Run 'gofmt -w .':"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet -mod=readonly ./...

  build-windows:
    needs: check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Install MinGW
        run: choco install mingw -y --no-progress
        shell: pwsh

      - name: Build
        run: |
          $VERSION = $env:GITHUB_REF_NAME -replace '^v',''
          if ($env:GITHUB_REF_TYPE -ne 'tag') { $VERSION = '0.0.0-dev' }
          $env:CGO_ENABLED=1
          $env:CC="gcc"
          go build -mod=readonly -tags desktop,production -ldflags "-H windowsgui -s -w -X github.com/Junhui20/PyMolt/internal/analyzer.AppVersion=$VERSION" -o pymolt.exe .
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: pymolt-windows
          path: pymolt.exe

  build-macos:
    needs: check
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [ "${GITHUB_REF_TYPE}" = "tag" ] || VERSION="0.0.0-dev"
          CGO_ENABLED=1 CGO_LDFLAGS="-framework UniformTypeIdentifiers" go build -mod=readonly -tags desktop,production -ldflags "-s -w -X github.com/Junhui20/PyMolt/internal/analyzer.AppVersion=${VERSION}" -o pymolt .

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: pymolt-macos
          path: pymolt

  build-linux:
    needs: check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Install dependencies
        run: |
          sudo apt-get update
          # Both WebKit ABIs: 4.1 for modern distros (Ubuntu 24.04+, Debian 12+,
          # Fedora, Arch) and 4.0 for legacy ones (Ubuntu 20.04/22.04).
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libwebkit2gtk-4.0-dev

      - name: Build (WebKit 4.1, modern)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [ "${GITHUB_REF_TYPE}" = "tag" ] || VERSION="0.0.0-dev"
          CGO_ENABLED=1 go build -mod=readonly -tags desktop,production,webkit2_41 -ldflags "-s -w -X github.com/Junhui20/PyMolt/internal/analyzer.AppVersion=${VERSION}" -o pymolt .

      - name: Build (WebKit 4.0, legacy)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [ "${GITHUB_REF_TYPE}" = "tag" ] || VERSION="0.0.0-dev"
          CGO_ENABLED=1 go build -mod=readonly -tags desktop,production -ldflags "-s -w -X github.com/Junhui20/PyMolt/internal/analyzer.AppVersion=${VERSION}" -o pymolt-webkit40 .

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: pymolt-linux
          path: |
            pymolt
            pymolt-webkit40

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts

      - name: Prepare release files and checksums
        run: |
          ls -R artifacts/
          cp artifacts/pymolt-windows/pymolt.exe pymolt-windows.exe
          cp artifacts/pymolt-macos/pymolt pymolt-macos
          cp artifacts/pymolt-linux/pymolt pymolt-linux
          cp artifacts/pymolt-linux/pymolt-webkit40 pymolt-linux-webkit4.0
          chmod +x pymolt-macos pymolt-linux pymolt-linux-webkit4.0
          sha256sum pymolt-windows.exe pymolt-macos pymolt-linux pymolt-linux-webkit4.0 > SHA256SUMS.txt
          echo "Published checksums:"
          cat SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pymolt-windows.exe
            pymolt-macos
            pymolt-linux
            pymolt-linux-webkit4.0
            SHA256SUMS.txt
          generate_release_notes: true
